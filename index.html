<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merchant Order Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* CSS Variables for Light/Dark Neon Theme */
        :root {
            --primary: #ec4899; /* Neon Pink/Magenta */
            --primary-hover: #db2777;
            --bg-color: #f8fafc;
            --surface-color: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --danger: #ef4444;
            --success: #10b981;
            --success-hover: #059669;
            --warning: #f59e0b;
            --radius: 12px;
            --shadow: 0 0 15px rgba(236, 72, 153, 0.15);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --glow-primary: 0 0 10px rgba(236, 72, 153, 0.3);
            --glow-success: 0 0 10px rgba(16, 185, 129, 0.3);
        }

        [data-theme="dark"] {
            --bg-color: #080710; /* Cyber Deep Black */
            --surface-color: #0f111a; /* Dark Carbon Card */
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #1e293b;
            --primary: #ff007f; /* Electric Neon Pink */
            --primary-hover: #e60072;
            --danger: #ff0055; /* Neon Red */
            --success: #39ff14; /* Radioactive Green */
            --success-hover: #2ecc12;
            --warning: #fff01f; /* Neon Yellow */
            --shadow: 0 0 20px rgba(255, 0, 127, 0.25);
            --glow-primary: 0 0 15px rgba(255, 0, 127, 0.6);
            --glow-success: 0 0 15px rgba(57, 255, 20, 0.6);
        }

        /* Reset & Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            transition: var(--transition);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Typography */
        h1, h2, h3 { font-weight: 600; }
        
        /* Navbar */
        nav {
            background-color: var(--surface-color);
            border-bottom: 2px solid var(--primary);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: var(--transition);
            box-shadow: var(--glow-primary);
        }

        .brand {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            text-shadow: var(--glow-primary);
        }

        .nav-actions {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        /* Buttons */
        button {
            cursor: pointer;
            border: none;
            outline: none;
            border-radius: 8px;
            font-weight: 500;
            transition: var(--transition);
        }

        .btn-primary {
            background-color: var(--primary);
            color: white;
            padding: 0.75rem 1.5rem;
            box-shadow: var(--glow-primary);
        }

        .btn-primary:hover { 
            background-color: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 0 20px var(--primary);
        }

        .btn-icon {
            background: transparent;
            color: var(--text-main);
            padding: 0.5rem;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--border-color);
        }

        .btn-icon:hover { 
            background-color: var(--border-color);
            color: var(--primary);
            border-color: var(--primary);
        }

        .btn-small {
            padding: 0.4rem 0.8rem;
            font-size: 0.875rem;
            background-color: var(--primary);
            color: white;
            box-shadow: var(--glow-primary);
        }
        
        .btn-small:hover { 
            background-color: var(--primary-hover);
            box-shadow: 0 0 12px var(--primary);
        }

        .btn-success {
            background-color: var(--success);
            color: white;
            box-shadow: var(--glow-success);
        }

        .btn-success:hover {
            background-color: var(--success-hover);
            box-shadow: 0 0 15px var(--success);
        }

        /* Layout & Views */
        .view-section {
            display: none;
            flex: 1;
            padding: 2rem;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }

        .view-section.active { display: block; animation: fadeIn 0.4s ease; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Auth Screen */
        .auth-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: calc(100vh - 70px);
        }

        .auth-card {
            background-color: var(--surface-color);
            padding: 2.5rem;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 400px;
            text-align: center;
            border: 1px solid var(--primary);
        }

        .auth-card h2 { 
            margin-bottom: 0.5rem; 
            color: var(--primary);
            text-shadow: var(--glow-primary);
        }
        .auth-card p { color: var(--text-muted); margin-bottom: 2rem; }

        /* Forms */
        .form-group {
            text-align: left;
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
            font-weight: 500;
        }

        .form-control {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background-color: var(--bg-color);
            color: var(--text-main);
            transition: var(--transition);
        }

        .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(236, 72, 153, 0.25), var(--glow-primary);
            outline: none;
        }

        /* Dashboard Layout */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
        }

        @media (min-width: 1024px) {
            .dashboard-grid { grid-template-columns: 300px 350px 1fr; }
        }

        .card {
            background-color: var(--surface-color);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 1.5rem;
            border: 1px solid var(--border-color);
            transition: var(--transition);
        }

        .card:hover {
            border-color: var(--primary);
            box-shadow: var(--glow-primary);
        }

        .card-header {
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border-color);
        }

        .card-header h3 {
            color: var(--primary);
            text-shadow: var(--glow-primary);
        }

        /* Calculator Styles */
        .btn-calc {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 0.75rem;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            border: 1px solid transparent;
        }

        .btn-calc:hover {
            background-color: var(--border-color);
            border-color: var(--primary);
            color: var(--primary);
            box-shadow: var(--glow-primary);
        }

        /* Table */
        .table-responsive { overflow-x: auto; }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            padding: 1rem;
            color: var(--text-muted);
            font-weight: 500;
            font-size: 0.875rem;
            border-bottom: 2px solid var(--border-color);
        }

        td {
            padding: 1rem;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.9rem;
        }

        tbody tr:hover { background-color: rgba(236, 72, 153, 0.03); }
        [data-theme="dark"] tbody tr:hover { background-color: rgba(255, 0, 127, 0.05); }

        /* Badges */
        .badge {
            padding: 0.25rem 0.75rem;
            border-radius: 999px;
            font-size: 0.75rem;
            font-weight: 600;
            display: inline-block;
            border: 1px solid transparent;
        }

        .badge-success { 
            background-color: rgba(16, 185, 129, 0.1); 
            color: var(--success); 
            border-color: var(--success);
        }
        .badge-warning { 
            background-color: rgba(245, 158, 11, 0.1); 
            color: var(--warning); 
            border-color: var(--warning);
        }
        .badge-danger { 
            background-color: rgba(239, 68, 68, 0.1); 
            color: var(--danger); 
            border-color: var(--danger);
        }
        .badge-neutral { 
            background-color: rgba(107, 114, 128, 0.1); 
            color: var(--text-muted); 
            border-color: var(--text-muted);
        }

        /* Action Buttons Wrapper */
        .action-container {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        /* Delivery details rendering styling */
        .delivery-details {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 6px;
            line-height: 1.4;
        }
        
        .delivery-details a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 2px;
        }

        .delivery-details a:hover {
            text-decoration: underline;
            text-shadow: var(--glow-primary);
        }

        /* Toast Notifications */
        #toast-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .toast {
            background-color: var(--surface-color);
            color: var(--text-main);
            padding: 1rem 1.5rem;
            border-radius: 8px;
            box-shadow: var(--shadow);
            border: 1px solid var(--primary);
            border-left: 4px solid var(--primary);
            animation: slideIn 0.3s ease, fadeOut 0.3s ease 2.7s forwards;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes fadeOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }

        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav>
        <div class="brand">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
            OrderNova
        </div>
        <div class="nav-actions">
            <button class="btn-icon" id="themeToggle" title="Toggle Theme">
                <!-- Moon Icon (Default) -->
                <svg id="moonIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                <!-- Sun Icon (Hidden by default) -->
                <svg id="sunIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display: none;"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
            </button>
            <button class="btn-primary" id="logoutBtn" style="display: none;">Logout</button>
        </div>
    </nav>

    <!-- Auth Section -->
    <section id="authSection" class="view-section active">
        <div class="auth-container">
            <div class="auth-card">
                <h2>Merchant Portal</h2>
                <p>Login to manage your orders</p>
                <form id="loginForm">
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="emailInput" class="form-control" placeholder="admin@ordernova.com" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="passwordInput" class="form-control" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn-primary" style="width: 100%;">Sign In</button>
                </form>
            </div>
        </div>
    </section>

    <!-- Dashboard Section -->
    <section id="dashboardSection" class="view-section">
        <div class="dashboard-grid">
            
            <!-- Price Calculator Card (Left) -->
            <div class="card">
                <div class="card-header">
                    <h3>Price Calculator</h3>
                </div>
                <div class="calculator">
                    <input type="text" id="calcDisplay" class="form-control" style="text-align: right; font-size: 1.5rem; font-weight: 600; margin-bottom: 1rem; border-color: var(--primary);" readonly value="0">
                    <div class="calc-grid" style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.5rem; margin-bottom: 1rem;">
                        <button type="button" class="btn-calc" onclick="clearCalc()">C</button>
                        <button type="button" class="btn-calc" onclick="inputCalc('/')">/</button>
                        <button type="button" class="btn-calc" onclick="inputCalc('*')">*</button>
                        <button type="button" class="btn-calc" onclick="backspaceCalc()">⌫</button>
                        
                        <button type="button" class="btn-calc" onclick="inputCalc('7')">7</button>
                        <button type="button" class="btn-calc" onclick="inputCalc('8')">8</button>
                        <button type="button" class="btn-calc" onclick="inputCalc('9')">9</button>
                        <button type="button" class="btn-calc" onclick="inputCalc('-')">-</button>
                        
                        <button type="button" class="btn-calc" onclick="inputCalc('4')">4</button>
                        <button type="button" class="btn-calc" onclick="inputCalc('5')">5</button>
                        <button type="button" class="btn-calc" onclick="inputCalc('6')">6</button>
                        <button type="button" class="btn-calc" onclick="inputCalc('+')">+</button>
                        
                        <button type="button" class="btn-calc" onclick="inputCalc('1')">1</button>
                        <button type="button" class="btn-calc" onclick="inputCalc('2')">2</button>
                        <button type="button" class="btn-calc" onclick="inputCalc('3')">3</button>
                        <button type="button" class="btn-calc" style="grid-row: span 2; background-color: var(--primary); color: white; box-shadow: var(--glow-primary);" onclick="calculateResult()">=</button>
                        
                        <button type="button" class="btn-calc" style="grid-column: span 2;" onclick="inputCalc('0')">0</button>
                        <button type="button" class="btn-calc" onclick="inputCalc('.')">.</button>
                    </div>
                    <button type="button" class="btn-primary" style="width: 100%; display: flex; align-items: center; justify-content: center; gap: 0.5rem;" onclick="applyCalcToPrice()">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                        Apply to Total Price
                    </button>
                </div>
            </div>
            
            <!-- Add Order Form (Middle) -->
            <div class="card">
                <div class="card-header">
                    <h3>Create New Order</h3>
                </div>
                <form id="orderForm">
                    <div class="form-group">
                        <label>Customer Address</label>
                        <textarea id="custAddress" class="form-control" rows="3" placeholder="Full delivery address..." required></textarea>
                    </div>
                    <div class="form-group">
                        <label>Total Price (RM)</label>
                        <input type="number" step="0.01" id="totalPrice" class="form-control" placeholder="0.00" required>
                    </div>
                    <div class="form-group">
                        <label>Payment Method</label>
                        <select id="payMethod" class="form-control" required>
                            <option value="Cash">Cash (COD)</option>
                            <option value="QR">DuitNow / QR Pay</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Payment Status</label>
                        <select id="payStatus" class="form-control" required>
                            <option value="Unpaid">Unpaid</option>
                            <option value="Paid">Paid</option>
                        </select>
                    </div>
                    <button type="submit" class="btn-primary" style="width: 100%; margin-top: 10px;">Add Order</button>
                </form>
            </div>

            <!-- Orders List (Right) -->
            <div class="card">
                <div class="card-header" style="display: flex; justify-content: space-between; align-items: center;">
                    <h3>Recent Orders</h3>
                    <span class="badge badge-neutral" id="totalOrdersCount">0 Orders</span>
                </div>
                <div class="table-responsive">
                    <table id="ordersTable">
                        <thead>
                            <tr>
                                <th>Order ID</th>
                                <th>Customer Address</th>
                                <th>Amount</th>
                                <th>Payment</th>
                                <th>Delivery Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="ordersBody">
                            <!-- Orders will be injected here -->
                        </tbody>
                    </table>
                    <div id="emptyState" class="empty-state">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" style="margin-bottom: 1rem; color: var(--text-muted);">
                            <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
                        </svg>
                        <p>No orders found. Add a new order to get started.</p>
                    </div>
                </div>
            </div>

        </div>
    </section>

    <!-- Toast Container -->
    <div id="toast-container"></div>

    <script>
        // --- State Management ---
        let orders = []; // Sequential order history state
        let nextOrderIdNum = 0; // Starts from ORD-0000 and increments sequentially
        let calcExpression = ''; // Holds active calculator expression
        
        // --- DOM Elements ---
        const themeToggle = document.getElementById('themeToggle');
        const moonIcon = document.getElementById('moonIcon');
        const sunIcon = document.getElementById('sunIcon');
        
        const authSection = document.getElementById('authSection');
        const dashboardSection = document.getElementById('dashboardSection');
        const loginForm = document.getElementById('loginForm');
        const logoutBtn = document.getElementById('logoutBtn');
        
        const orderForm = document.getElementById('orderForm');
        const ordersBody = document.getElementById('ordersBody');
        const emptyState = document.getElementById('emptyState');
        const totalOrdersCount = document.getElementById('totalOrdersCount');

        // --- Theme Switcher Logic ---
        function toggleTheme() {
            const currentTheme = document.body.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.body.setAttribute('data-theme', newTheme);
            
            if (newTheme === 'dark') {
                moonIcon.style.display = 'none';
                sunIcon.style.display = 'block';
            } else {
                moonIcon.style.display = 'block';
                sunIcon.style.display = 'none';
            }
        }
        themeToggle.addEventListener('click', toggleTheme);

        // --- Auth Logic ---
        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const email = document.getElementById('emailInput').value;
            const password = document.getElementById('passwordInput').value;
            
            // Validate credentials
            if (email === 'admin@ordernova.com' && password === 'admin123') {
                authSection.classList.remove('active');
                dashboardSection.classList.add('active');
                logoutBtn.style.display = 'block';
                showToast('Successfully logged in!', 'success');
                renderOrders();
            } else {
                alert('Invalid email or password. Please try again.');
            }
        });

        logoutBtn.addEventListener('click', () => {
            dashboardSection.classList.remove('active');
            authSection.classList.add('active');
            logoutBtn.style.display = 'none';
            loginForm.reset();
        });

        // --- Calculator Logic ---
        window.inputCalc = function(char) {
            const display = document.getElementById('calcDisplay');
            if (display.value === '0' && !isNaN(char)) {
                calcExpression = char;
            } else {
                calcExpression += char;
            }
            display.value = calcExpression;
        };

        window.clearCalc = function() {
            calcExpression = '';
            document.getElementById('calcDisplay').value = '0';
        };

        window.backspaceCalc = function() {
            const display = document.getElementById('calcDisplay');
            calcExpression = calcExpression.slice(0, -1);
            display.value = calcExpression || '0';
        };

        window.calculateResult = function() {
            const display = document.getElementById('calcDisplay');
            try {
                if (!calcExpression) return;
                // Sanitize mathematical characters only
                const sanitized = calcExpression.replace(/[^0-9+\-*/.]/g, '');
                const result = Function(`"use strict"; return (${sanitized})`)();
                
                if (result !== undefined && !isNaN(result)) {
                    calcExpression = String(Number(result.toFixed(2)));
                    display.value = calcExpression;
                } else {
                    throw new Error();
                }
            } catch (e) {
                display.value = 'Error';
                calcExpression = '';
            }
        };

        window.applyCalcToPrice = function() {
            const display = document.getElementById('calcDisplay');
            const priceInput = document.getElementById('totalPrice');
            
            // Resolve active expression first
            calculateResult();
            
            const val = parseFloat(display.value);
            if (!isNaN(val) && val >= 0) {
                priceInput.value = val.toFixed(2);
                showToast(`Applied RM ${val.toFixed(2)} to Total Price!`, 'success');
            } else {
                showToast(`Invalid amount to apply.`, 'warning');
            }
        };

        // --- Order Management Logic ---
        
        // Render Orders
        function renderOrders() {
            ordersBody.innerHTML = '';
            totalOrdersCount.textContent = `${orders.length} Order${orders.length !== 1 ? 's' : ''}`;
            
            if (orders.length === 0) {
                emptyState.style.display = 'block';
                return;
            }
            
            emptyState.style.display = 'none';
            
            orders.forEach((order, index) => {
                const tr = document.createElement('tr');
                
                // Payment Badge Logic
                const payBadgeClass = order.paymentStatus === 'Paid' ? 'badge-success' : 'badge-danger';
                
                // Delivery Badge Logic
                const delBadgeClass = order.deliveryStatus === 'Delivered' ? 'badge-success' : 'badge-warning';
                
                // Build Delivery status representation with Google Maps coordinates and GMT+8 timestamp
                let deliveryStatusContent = `<span class="badge ${delBadgeClass}">${order.deliveryStatus}</span>`;
                if (order.deliveryStatus === 'Delivered') {
                    deliveryStatusContent += `
                        <div class="delivery-details">
                            <a href="${order.deliveryLocation || '#'}" target="_blank">
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
                                Locked Location
                            </a>
                            <div style="font-size: 0.7rem; color: var(--text-muted); margin-top: 2px;">
                                🕒 ${order.deliveryTime || ''}
                            </div>
                        </div>
                    `;
                }

                // Create clean layout for Actions
                let actionsHtml = `<div class="action-container">`;
                let hasActions = false;

                // Action 1: Update Payment Status button (Only show if Unpaid)
                if (order.paymentStatus === 'Unpaid') {
                    actionsHtml += `<button class="btn-small btn-success" onclick="payOrder(${index})">Mark Paid</button>`;
                    hasActions = true;
                }

                // Action 2: Deliver button (Only show if Pending)
                if (order.deliveryStatus === 'Pending') {
                    actionsHtml += `<button class="btn-small" onclick="deliverOrder(${index})">Deliver</button>`;
                    hasActions = true;
                }

                if (!hasActions) {
                    actionsHtml += `<span style="color: var(--text-muted); font-size: 0.8rem; font-weight: 500;">Completed</span>`;
                }
                
                actionsHtml += `</div>`;

                tr.innerHTML = `
                    <td><strong>${order.id}</strong></td>
                    <td>
                        <div style="font-weight: 500; max-width: 250px; word-break: break-word;">${order.address}</div>
                    </td>
                    <td style="font-weight: 600;">RM ${parseFloat(order.price).toFixed(2)}</td>
                    <td>
                        <div style="margin-bottom: 4px; font-weight: 500;">${order.method}</div>
                        <span class="badge ${payBadgeClass}">${order.paymentStatus}</span>
                    </td>
                    <td>${deliveryStatusContent}</td>
                    <td>${actionsHtml}</td>
                `;
                ordersBody.appendChild(tr);
            });
        }

        // Add New Order
        orderForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            // Format ID sequentially (starting from ORD-0000)
            const orderId = 'ORD-' + String(nextOrderIdNum).padStart(4, '0');
            nextOrderIdNum++;

            const newOrder = {
                id: orderId,
                address: document.getElementById('custAddress').value,
                price: document.getElementById('totalPrice').value,
                method: document.getElementById('payMethod').value,
                paymentStatus: document.getElementById('payStatus').value,
                deliveryStatus: 'Pending',
                deliveryTime: null,
                deliveryLocation: null
            };
            
            // Add to top of array
            orders.unshift(newOrder);
            renderOrders();
            orderForm.reset();
            
            showToast(`Order ${newOrder.id} created successfully!`, 'success');
        });

        // Update Payment Status
        window.payOrder = function(index) {
            orders[index].paymentStatus = 'Paid';
            renderOrders();
            showToast(`Order ${orders[index].id} payment marked as Paid.`, 'success');
        };

        // Mark as Delivered (Locks Location & GMT+8 timestamp)
        window.deliverOrder = function(index) {
            // Setup GMT+8 Current Time
            const now = new Date();
            const utcTime = now.getTime() + (now.getTimezoneOffset() * 60000);
            const gmt8Time = new Date(utcTime + (3600000 * 8));
            
            // Format time clean: YYYY-MM-DD HH:MM:SS GMT+8
            const formattedTime = gmt8Time.getFullYear() + '-' +
                String(gmt8Time.getMonth() + 1).padStart(2, '0') + '-' +
                String(gmt8Time.getDate()).padStart(2, '0') + ' ' +
                String(gmt8Time.getHours()).padStart(2, '0') + ':' +
                String(gmt8Time.getMinutes()).padStart(2, '0') + ':' +
                String(gmt8Time.getSeconds()).padStart(2, '0') + ' GMT+8';

            // Check and request geolocation coordinates with high accuracy options
            if (navigator.geolocation) {
                const geoOptions = {
                    enableHighAccuracy: true,
                    timeout: 10000,
                    maximumAge: 0
                };

                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        const lat = position.coords.latitude;
                        const lon = position.coords.longitude;
                        orders[index].deliveryLocation = `https://www.google.com/maps?q=${lat},${lon}`;
                        executeDeliveryState(index, formattedTime);
                    },
                    (error) => {
                        // User denied geolocation or fallback. Use default (Teluk Intan coordinates)
                        orders[index].deliveryLocation = `https://www.google.com/maps?q=4.0027,101.0195`;
                        executeDeliveryState(index, formattedTime);
                        showToast(`Deliver locked with default coordinates.`, 'warning');
                    },
                    geoOptions
                );
            } else {
                // Browser doesn't support geolocation
                orders[index].deliveryLocation = `https://www.google.com/maps?q=4.0027,101.0195`;
                executeDeliveryState(index, formattedTime);
            }
        };

        // Finalise delivery state change
        function executeDeliveryState(index, timestamp) {
            orders[index].deliveryStatus = 'Delivered';
            orders[index].deliveryTime = timestamp;
            
            // If it was Cash (COD) and Unpaid, auto mark as Paid upon delivery
            if (orders[index].method === 'Cash' && orders[index].paymentStatus === 'Unpaid') {
                orders[index].paymentStatus = 'Paid';
            }
            
            renderOrders();
            showToast(`Order ${orders[index].id} marked as delivered.`, 'success');
        }

        // --- UI Utilities ---
        function showToast(message, type = 'success') {
            const toastContainer = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast';
            
            // Icon based on type
            let strokeColor = 'var(--success)';
            if (type === 'warning') strokeColor = 'var(--warning)';
            
            const icon = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="${strokeColor}" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>`;
                
            toast.innerHTML = `${icon} <span>${message}</span>`;
            
            toastContainer.appendChild(toast);
            
            // Remove from DOM after animation completes
            setTimeout(() => {
                if (toastContainer.contains(toast)) {
                    toastContainer.removeChild(toast);
                }
            }, 3000);
        }

    </script>
</body>
</html>
